<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K9Labz</title>

  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Nunito:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --text: #C9A44A;
      --footer: #7A7A7A;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Teko', sans-serif;
    }

    .centered {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    .container {
      max-width: 700px;
      padding: 20px;
      margin-top: -100px;
    }

    img.logo {
      width: 400px;
      max-width: 80%;
      height: auto;
      margin-bottom: 24px;
    }

    h1.slogan {
      font-weight: 600;
      font-size: 1.8rem;
      line-height: 1.3;
      margin: 0;
      padding: 0 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      h1.slogan { font-size: 1.4rem; }
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--footer);
      pointer-events: none;
      user-select: none;
      background: var(--bg);
      z-index: 20;
      padding: 12px 0;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="centered">
    <div class="container">
      <img src="logo.png" alt="K9Labz" class="logo">
      <h1 class="slogan">Dedication. Discipline. Partnership.</h1>
    </div>
  </div>
  <div class="footer">&copy; 2026 <a href="https://craz.com">Crabtree Labz</a></div>
</body>
</html>
